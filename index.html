<body>

  <!-- Hero Section -->
  <section class="hero" aria-label="HENAD ONE">
    <div class="hero-inner">
      <!-- Golden Circle / Ring Logo -->
      <div class="logo-ring" aria-label="The One — golden circle emblem">
        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" class="ring-svg" aria-hidden="true">
          <defs>
            <filter id="ring-glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
              <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2"/>
              <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur3"/>
              <feMerge>
                <feMergeNode in="blur3"/>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#D4AF37"/>
              <stop offset="50%" stop-color="#C9A84C"/>
              <stop offset="100%" stop-color="#B8962E"/>
            </linearGradient>
          </defs>
          <!-- Outer glow layers -->
          <circle cx="150" cy="150" r="120" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="30" filter="url(#ring-glow)"/>
          <!-- Main ring -->
          <circle cx="150" cy="150" r="120" fill="none" stroke="url(#gold-gradient)" stroke-width="1.8"/>
        </svg>
      </div>

      <!-- Brand Name -->
      <h1 class="brand-name">HENAD ONE</h1>
      <p class="brand-suffix">FZCO</p>
    </div>
  </section>

  <!-- Slogan Section -->
  <section class="section-slogan" aria-label="Slogan">
    <p class="slogan fade-in">From The One, to the one.</p>
  </section>

  <!-- Tagline Section -->
  <section class="section-tagline" aria-label="Tagline">
    <p class="tagline fade-in">Unity Beyond All.</p>
  </section>

  <!-- Contact Section -->
  <section class="section-contact" aria-label="Contact">
    <div class="divider"></div>
    <a href="mailto:hello@henadone.com" class="contact-email">hello@henadone.com</a>
  </section>

  <script src="./app.js" defer></script>
